<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Round 1 - MCOE Debugging</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div id="particles-background"></div>
    <div class="overlay-grid"></div>

    <header id="top-bar" class="hidden">
        <div class="header-left">
            <span class="glitch-text" data-text="DEBUG_CHALLENGE">DEBUGGING CHALLENGE</span>
        </div>
        <div class="header-center">
            <div id="round-indicator">ROUND 1</div>
        </div>
        <div class="header-right">
            <div id="timer-display">10:00</div>
            <div id="score-display">Score: 0</div>
        </div>
    </header>

    <main id="app-container">
        <!-- Content will be injected here dynamically -->
    </main>

    <div id="fullscreen-warning" class="fullscreen-overlay d-none">
        <h1 class="screen-title" style="color: var(--error); text-shadow: 0 0 10px var(--error);">FULLSCREEN REQUIRED</h1>
        <p style="font-size: 1.2rem; margin-bottom: 2rem;">You must remain in fullscreen mode during the challenge.</p>
        <button class="btn btn-primary" onclick="recoverFullscreen()">RETURN TO FULLSCREEN</button>
    </div>

    <div id="admin-modal" class="fullscreen-overlay d-none">
        <div class="panel" style="max-width: 400px; width: 100%;">
            <h2 style="color: var(--accent); text-align: center; margin-bottom: 1.5rem;">Admin Previleges</h2>
            <input type="text" id="admin-user" placeholder="Username" autocomplete="off" />
            <input type="password" id="admin-pass" placeholder="Password" class="password-input" />
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button class="btn btn-primary" onclick="verifyAdmin()">UNLOCK</button>
                <button class="btn" style="border-color: var(--text-muted); color: var(--text-muted);" onclick="closeAdminModal()">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="custom-alert" class="fullscreen-overlay d-none" style="z-index: 10005;">
        <div class="panel" style="max-width: 500px; width: 100%; text-align: center;">
            <p id="custom-alert-message" style="font-size: 1.2rem; margin-bottom: 2rem; white-space: pre-wrap; color: var(--text-primary);"></p>
            <button class="btn btn-primary" onclick="closeCustomAlert()">OK</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
